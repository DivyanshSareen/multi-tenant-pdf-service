---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pdf-service.fullname" . }}-minio-pvc
  labels:
    {{- include "pdf-service.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.minio.storage }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pdf-service.fullname" . }}-minio
  labels:
    {{- include "pdf-service.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "pdf-service.fullname" . }}-minio-service
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "pdf-service.fullname" . }}-minio
  template:
    metadata:
      labels:
        app: {{ include "pdf-service.fullname" . }}-minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          args: [server, /data, --console-address, ":{{ .Values.minio.consolePort }}"]
          ports:
            - containerPort: {{ .Values.minio.port }}
            - containerPort: {{ .Values.minio.consolePort }}
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.rootPassword | quote }}
          volumeMounts:
            - name: minio-storage
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: {{ .Values.minio.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: {{ include "pdf-service.fullname" . }}-minio-pvc
