apiVersion: v1
kind: Service
metadata:
  name: {{ include "pdf-service.fullname" . }}-minio-service
  labels:
    {{- include "pdf-service.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "pdf-service.fullname" . }}-minio
  ports:
    - name: api
      port: {{ .Values.minio.port }}
      targetPort: {{ .Values.minio.port }}
    - name: console
      port: {{ .Values.minio.consolePort }}
      targetPort: {{ .Values.minio.consolePort }}
