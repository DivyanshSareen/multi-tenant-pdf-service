apiVersion: v1
kind: Service
metadata:
  name: {{ include "pdf-service.fullname" . }}-postgres-service
  labels:
    {{- include "pdf-service.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "pdf-service.fullname" . }}-postgres
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
