---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: pdf-service
data:
  SERVER_PORT: "8080"
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: "5432"
  POSTGRES_USER: admin
  POSTGRES_DB: master_registry
  POSTGRES_SSLMODE: disable
  MONGO_URI: mongodb://mongodb-service:27017
  MINIO_ENDPOINT: minio-service:9000
  MINIO_USE_SSL: "false"
  LLM_PROVIDER: openai
  OPENAI_MODEL: gpt-4o-mini
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: pdf-service
type: Opaque
stringData:
  POSTGRES_PASSWORD: secretpass
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  API_KEY: changeme
  # Set OPENAI_API_KEY to your real key before deploying.
  OPENAI_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf-service
  namespace: pdf-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pdf-service
  template:
    metadata:
      labels:
        app: pdf-service
    spec:
      containers:
        - name: pdf-service
          image: pdf-service:latest
          # Use IfNotPresent so kind-loaded images are picked up without a registry.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pdf-service
  namespace: pdf-service
spec:
  type: NodePort
  selector:
    app: pdf-service
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
